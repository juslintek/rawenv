# SwiftLint — safety-focused configuration for the rawenv macOS GUI.
# `swift format` owns deterministic LAYOUT (run in pre-commit); SwiftLint enforces
# SEMANTICS/SAFETY. The pre-push gate blocks on error-severity rules; everything
# else is an advisory warning.
# Run: swiftlint  (lint)   swiftlint --fix  (autocorrect)
# Docs: https://realm.github.io/SwiftLint/rule-directory.html

included:
  - gui/macos/Sources
  - gui/macos/Tests

excluded:
  - gui/macos/.build
  - gui/macos/build

# Rules that conflict with `swift format` (which is the formatting authority) or
# are pure stylistic preference fighting idiomatic SwiftUI — disabled here.
disabled_rules:
  - trailing_comma                       # swift format adds them; SwiftLint default forbids
  - opening_brace                        # swift format owns brace placement
  - multiple_closures_with_trailing_closure  # idiomatic in SwiftUI
  - blanket_disable_command
  - identifier_name                      # Codable structs use snake_case to mirror JSON/CLI wire format (no CodingKeys boilerplate)
  - type_name                            # inline throwaway Decodable structs in tests (struct V: Decodable …)

# Opt-in rules — high-signal SAFETY/correctness rules. Pure layout/whitespace is
# owned by `swift format` (deterministic), so we deliberately do NOT enable the
# noisy `attributes` / `multiline_*` style rules here.
opt_in_rules:
  - array_init
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - lower_acl_than_parent
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unused_import
  - yoda_condition

analyzer_rules:
  - unused_import

# Tunables — keep generous enough for the existing layout; tighten over time.
line_length:
  warning: 160
  error: 220
  ignores_comments: true
  ignores_urls: true

type_name:
  min_length: 1          # allow inline throwaway Decodable structs in tests (struct V: Decodable …)
  max_length:
    warning: 50
    error: 70

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 700
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 140

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length: 1          # allow short SwiftUI idioms (e.g. vm, id)
  max_length: 60
  excluded: [id, vm, ai, x, y, p, e, s, l, c]

nesting:
  type_level: 3

force_cast: error
force_try: error
