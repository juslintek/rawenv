name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: rawenv-aarch64-macos
            build: zig build -Doptimize=ReleaseSafe
            bin: zig-out/bin/rawenv
          - os: macos-13
            artifact: rawenv-x86_64-macos
            build: zig build -Doptimize=ReleaseSafe
            bin: zig-out/bin/rawenv
          - os: ubuntu-latest
            artifact: rawenv-x86_64-linux
            build: zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseSafe
            bin: zig-out/bin/rawenv
          - os: ubuntu-latest
            artifact: rawenv-aarch64-linux
            build: zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseSafe
            bin: zig-out/bin/rawenv
          - os: windows-latest
            artifact: rawenv-x86_64-windows
            build: zig build -Dtarget=x86_64-windows -Doptimize=ReleaseSafe
            bin: zig-out/bin/rawenv.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        shell: bash
        run: |
          # Strip the leading "v" from the tag (v1.0.0 -> 1.0.0) and inject it
          # into the binary so `rawenv --version` reports the released version.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building ${{ matrix.artifact }} version ${VERSION}"
          ${{ matrix.build }} -Dversion="${VERSION}"
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.artifact }}" == *windows* ]]; then
            cp "${{ matrix.bin }}" "dist/rawenv.exe"
            cd dist && zip "${{ matrix.artifact }}.zip" rawenv.exe && rm rawenv.exe
          else
            cp "${{ matrix.bin }}" "dist/rawenv"
            cd dist && tar czf "${{ matrix.artifact }}.tar.gz" rawenv && rm rawenv
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum rawenv-* | tee SHA256SUMS
      - name: Render Homebrew formula (release asset)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Render only into the artifacts dir so the tracked template stays
          # clean for the commit-back step below.
          scripts/gen-homebrew-formula.sh "${VERSION}" artifacts/SHA256SUMS > artifacts/rawenv.rb
          cat artifacts/rawenv.rb
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rawenv-*
            artifacts/SHA256SUMS
            artifacts/rawenv.rb
          generate_release_notes: true
      - name: Commit resolved Homebrew formula to default branch
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
          scripts/gen-homebrew-formula.sh "${VERSION}" artifacts/SHA256SUMS > packaging/homebrew/rawenv.rb
          if git diff --quiet -- packaging/homebrew/rawenv.rb; then
            echo "Formula unchanged; nothing to commit."
            exit 0
          fi
          git add packaging/homebrew/rawenv.rb
          git commit -m "chore(release): update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin "${DEFAULT_BRANCH}"
