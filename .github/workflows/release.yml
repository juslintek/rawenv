name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-macos
            artifact: rawenv-macos-arm64
          - os: macos-14
            target: x86_64-macos
            artifact: rawenv-macos-x64
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: rawenv-linux-x64
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: rawenv-linux-arm64
          - os: windows-latest
            target: x86_64-windows
            artifact: rawenv-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: zig-out/bin/rawenv*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate SHA256SUMS
        run: |
          find . -name 'rawenv*' -type f ! -name 'SHA256SUMS' | sort | while read f; do
            sha256sum "$f" | sed 's|  .*/|  |'
          done > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            **/rawenv*
            SHA256SUMS
          generate_release_notes: true
