name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-macos
            os: macos-latest
            ext: tar.gz
          - target: x86_64-macos
            os: macos-latest
            ext: tar.gz
          - target: x86_64-linux
            os: ubuntu-latest
            ext: tar.gz
          - target: aarch64-linux
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-windows
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build
        run: zig build -Doptimize=ReleaseSafe
      - name: Package (unix)
        if: matrix.ext == 'tar.gz'
        run: tar czf rawenv-${{ matrix.target }}.tar.gz -C zig-out/bin rawenv
      - name: Package (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: Compress-Archive -Path zig-out/bin/rawenv.exe -DestinationPath rawenv-${{ matrix.target }}.zip
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rawenv-${{ matrix.target }}
          path: rawenv-${{ matrix.target }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: rawenv-*/rawenv-*
          generate_release_notes: true
