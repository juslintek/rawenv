name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-macos
            os: macos-latest
            archive: tar.gz
          - target: x86_64-macos
            os: macos-latest
            archive: tar.gz
          - target: x86_64-linux
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-linux
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-windows
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Build
        run: zig build ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf rawenv-${{ matrix.target }}.tar.gz -C zig-out/${{ matrix.target }} rawenv

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path zig-out/${{ matrix.target }}/rawenv.exe -DestinationPath rawenv-${{ matrix.target }}.zip

      - name: Generate checksum
        shell: bash
        run: shasum -a 256 rawenv-${{ matrix.target }}.* | grep -v '\.sha256' > rawenv-${{ matrix.target }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rawenv-${{ matrix.target }}
          path: |
            rawenv-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rawenv-*.tar.gz
            artifacts/rawenv-*.zip
            artifacts/SHA256SUMS
