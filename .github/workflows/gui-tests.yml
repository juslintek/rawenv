name: GUI Tests
on:
  push:
    branches: [main]
    paths: ['gui/**', 'shared/**']
  pull_request:
    paths: ['gui/**', 'shared/**']

permissions:
  contents: read

jobs:
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: npx ajv-cli@5 validate --spec=draft2020 -s shared/schema.json -d shared/mock-data.json

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
          use-cache: false
      # The GUI integration/E2E tests shell out to the rawenv CLI and use the
      # repo as a fixture. Build the CLI and point the tests at it + the repo
      # via env (tests fall back to a local dev path when these are unset).
      - name: Build rawenv CLI
        run: zig build
      - name: Build and test
        env:
          RAWENV_BINARY: ${{ github.workspace }}/zig-out/bin/rawenv
          RAWENV_REPO: ${{ github.workspace }}
        run: cd gui/macos && swift build && swift test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-test-results
          path: gui/macos/.build/

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Build test container
        run: docker build -f gui/linux/Dockerfile.test -t rawenv-linux-test .
      - name: Unit tests (meson) — gate
        run: docker run --rm rawenv-linux-test
      # dogtail GTK4 AT-SPI automation is fragile in headless CI. Run it as a
      # visible, non-blocking step: a regression shows as a failed step (signal
      # preserved) but does not block merge, while the meson unit tests above gate.
      - name: GUI e2e (dogtail) — non-blocking
        continue-on-error: true
        run: |
          docker run --rm rawenv-linux-test sh -c '
            Xvfb :99 -screen 0 1280x1024x24 &
            sleep 1
            dbus-run-session -- sh -c "cd /app/gui/linux && python3 -m pytest -v tests/e2e"
          '

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: cd gui/windows && dotnet build Rawenv.Tests/Rawenv.Tests.csproj
      - name: Run unit tests
        run: cd gui/windows && dotnet test Rawenv.Tests/Rawenv.Tests.csproj --logger trx
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-test-results
          path: gui/windows/**/TestResults/
