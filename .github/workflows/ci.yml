name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
      # rawenv's resolver, store, and service manager are darwin/linux-only by
      # design (launchd/systemd, POSIX paths/HOME). Windows is a cross-compile
      # target, so the full test suite runs only on macOS and Linux; every
      # platform still compiles the binary (the Build step below) as a check.
      - name: Run tests
        if: matrix.os != 'windows-latest'
        run: zig build test
      - name: Build (compile check on all platforms)
        run: zig build -Doptimize=ReleaseSafe
